table-mapping:
  tables:

    client:

      identifier:
        - clientId

      skipIfEmpty: true

      columns:

        clientId:
          identifiers:
            - emp_id
            - employeeId
            - id
            - clientId

        name:
          identifiers:
            - emp_name
            - employeeName
            - name

        age:
          identifiers:
            - age
            - employeeAge

        department:
          identifiers:
            - dept
            - department

        email:
          identifiers:
            - email
            - emailAddress

      children:
        - address


    address:

      parent: client

      parentReference: clientId

      skipIfEmpty: true

      identifier:
        - address
        - city
        - state
        - country

      columns:

        address:
          identifiers:
            - address
            - street

        city:
          identifiers:
            - city
            - town

        state:
          identifiers:
            - state
            - province

        country:
          identifiers:
            - country
            - nation

      children:
        - contact


    contact:

      parent: address

      parentReference: address

      identifier:
        - phone

      skipIfEmpty: true

      columns:

        phone:
          identifiers:
            - phone
            - mobile
            - contactNumber

        contactType:
          identifiers:
            - contactType
            - type

        extension:
          identifiers:
            - extension
            - ext

        availability:
          identifiers:
            - availability
            - time