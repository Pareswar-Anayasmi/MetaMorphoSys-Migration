table-mapping:
  tables:

    # ─────────────────────────────────────────────
    # PRIMARY CLIENT
    # A new GUID is generated for every CSV row.
    # ─────────────────────────────────────────────
    client:

      guidColumn: client_guid          # column name that will hold the generated GUID

      skipIfEmpty: true

      columns:

        clientId:
          identifiers:
            - emp_id
            - employeeId
            - id
            - clientId

        name:
          identifiers:
            - emp_name
            - employeeName
            - name

        age:
          identifiers:
            - age
            - employeeAge

        department:
          identifiers:
            - dept
            - department

        email:
          identifiers:
            - email
            - emailAddress

      children:
        - address


    # ─────────────────────────────────────────────
    # ADDRESS
    # Holds client_guid as foreign key (set by code).
    # ─────────────────────────────────────────────
    address:

      guidColumn: address_guid         # GUID generated for this address row

      parent: client
      parentGuidRef: client_guid       # FK column injected from parent GUID

      skipIfEmpty: true

      columns:

        address:
          identifiers:
            - address
            - street

        city:
          identifiers:
            - city
            - town

        state:
          identifiers:
            - state
            - province

        country:
          identifiers:
            - country
            - nation

      children:
        - contact


    # ─────────────────────────────────────────────
    # CONTACT
    # Holds address_guid as foreign key (set by code).
    # ─────────────────────────────────────────────
    contact:

      guidColumn: contact_guid
      parent: address
      parentGuidRef: address_guid      # FK column injected from parent GUID

      skipIfEmpty: true

      columns:

        phone:
          identifiers:
            - phone
            - mobile
            - contactNumber

        contactType:
          identifiers:
            - contactType
            - type

        extension:
          identifiers:
            - extension
            - ext

        availability:
          identifiers:
            - availability
            - time


    # ─────────────────────────────────────────────
    # NOMINEE CLIENT
    # Nominee columns are prefixed with "nominee_" in CSV.
    # Inserts another row into the client sheet.
    # ─────────────────────────────────────────────
    nomineeClient:

      tableName: client                # write nominee rows into client output table
      guidColumn: client_guid          # nominee client also gets a client_guid

      sourcePrefix: nominee_           # all CSV columns for this table are prefixed

      skipIfEmpty: true

      columns:
        clientId:
          identifiers:
            - nominee_emp_id

        name:
          identifiers:
            - nominee_name

        age:
          identifiers:
            - nominee_age

        email:
          identifiers:
            - nominee_email

        relationship:
          identifiers:
            - nominee_relationship
            - relationship

      children:
        - benefit


    # ─────────────────────────────────────────────
    # BENEFIT
    # Links primary client GUID ↔ nominee client GUID.
    # ─────────────────────────────────────────────
    benefit:

      parent: nomineeClient
      parentGuidRef: nominee_client_guid   # FK from nominee

      rootGuidRef: client_guid             # FK from root (primary) client

      skipIfEmpty: true

      columns:

        benefitType:
          identifiers:
            - benefit_type
            - benefitType

        benefitAmount:
          identifiers:
            - benefit_amount
            - benefitAmount

        benefitPercentage:
          identifiers:
            - benefit_percentage
            - benefitPercentage

