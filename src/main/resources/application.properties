# Application name
spring.application.name=migration-service

# Server configuration
server.port=8080

# Application context path
server.servlet.context-path=/migration

# File upload limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Logging level
logging.level.root=INFO
logging.level.com.metanorph=DEBUG